name: Build and Release Windows EXE

on:
  push:
    tags:
      - 'v*' # 当推送形如 v1.0, v2.1 等 tag 时自动触发发布
  workflow_dispatch: # 允许在 Actions 页面手动运行

permissions:
  contents: write # 允许创建 Release

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Integrate vcpkg
      run: |
        cd "$env:VCPKG_INSTALLATION_ROOT"
        git pull
        .\vcpkg update
        .\vcpkg integrate install

    - name: Install libwebsockets via vcpkg
      run: |
        vcpkg install libwebsockets:x64-windows

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" -DLeapSDK_DIR="${{ github.workspace }}\LeapSDK\lib\cmake\LeapSDK" -DCMAKE_BUILD_TYPE=Release ..

    - name: Build
      run: |
        cd build
        cmake --build . --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UltraleapTrackingWebSocket-Windows-EXE
        path: build/Release/*.exe # 匹配生成的 exe 文件

    - name: GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: build/Release/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
